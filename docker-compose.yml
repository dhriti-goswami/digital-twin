services:
  # PostgreSQL with TimescaleDB extension
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: digital_twin_postgres
    environment:
      POSTGRES_DB: digital_twin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: digitaltwin2024
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend with ML Model
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: digital_twin_backend
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB__USE_SQLITE=false
      - DB__POSTGRES_HOST=postgres
      - DB__POSTGRES_PORT=5432
      - DB__POSTGRES_DB=digital_twin
      - DB__POSTGRES_USER=postgres
      - DB__POSTGRES_PASSWORD=digitaltwin2024
      - OLLAMA_HOST=http://host.docker.internal:11434
    volumes:
      - ./checkpoints:/app/checkpoints:ro
      - ./data/vectors:/app/data/vectors
      - ./data/guidelines:/app/data/guidelines:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: digital_twin_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    restart: unless-stopped

  # Redis for pub/sub and caching
  redis:
    image: redis:7-alpine
    container_name: digital_twin_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ChromaDB for vector storage
  chromadb:
    image: chromadb/chroma:latest
    container_name: digital_twin_chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE

volumes:
  postgres_data:
  redis_data:
  chroma_data:
